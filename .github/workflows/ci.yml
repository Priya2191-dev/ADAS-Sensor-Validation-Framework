name: ADAS Automation CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout Repository
      uses: actions/checkout@v3

    # 2. Setup Python
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    # 3. Install dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Run Pytest (Unit Tests)
    - name: Run Pytest
      run: |
        pytest -v

    # 5. Run BDD Tests (Behave)
    - name: Run Behave Tests
      run: |
        behave

    # 6. Generate Test Summary
    - name: Test Summary
      run: echo "All tests executed successfully!"
